type ArchnemesisMetaRewards {
  Id: string
  RewardText: string @localized
  RewardGroup: i32
  ScriptArgument: string
  MinLevel: i32
  MaxLevel: i32
}

type ArchnemesisModComboAchievements {
  Achievement: AchievementItems
  Mods: [ArchnemesisMods]
}

type ArchnemesisMods {
  Mod: Mods
  Name: string @localized
  Visual: ArchnemesisModVisuals
  TextStyles: [string]
  _: bool
  _: bool
  _: bool
}

type ArchnemesisModVisuals {
  Id: string @unique
  MiscAnimated: MiscAnimated
  StampFamily: StampFamily
  MiscEffectPack: MiscEffectPacks
  BuffVisual: [BuffVisuals]
  Monster: [MonsterVarieties]
  MonsterMiscAnimated: [MiscAnimated]
  MonsterEffectPack: [MiscEffectPacks]
}

type ArchnemesisRecipes {
  Result: ArchnemesisMods
  Recipe: [ArchnemesisMods]
  _: i32
}
